<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDE — Studio for Designed Environments</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 8vw;
      box-sizing: border-box;
    }
    .content {
      max-width: 760px;
    }
    h1 {
      font-size: clamp(42px, 8vw, 96px);
      line-height: 0.95;
      margin: 0 0 32px;
      font-weight: 400;
      letter-spacing: -0.05em;
    }
    p {
      font-size: clamp(20px, 2.2vw, 32px);
      line-height: 1.25;
      margin: 0 0 48px;
      color: #d8d8d8;
    }
    a {
      color: #f2f2f2;
      text-decoration: none;
      border-bottom: 1px solid #f2f2f2;
    }
  </style>
</head>
<body>
  <main>
    <div class="content">
      <h1>SDE<br>Studio for Designed Environments</h1>
      <p>Architecture, spatial design and cultural environments for a world in transformation.</p>
      <a href="mailto:hello@studio-de.com">hello@studio-de.com</a>
    </div>
  </main>
</body>
</html>
